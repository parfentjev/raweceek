name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          push: true
      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
      - name: Set up helm
        uses: azure/setup-helm@v5
      - name: Set up network
        run: |
          sudo apt install -y wireguard
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
      - name: Deploy
        run: |
          helm upgrade --install raweceek ./helm \
            --set image.tag="${{ github.ref_name }}" \
            --set-string secrets.databaseUser="${{ secrets.DATABASE_USER }}" \
            --set-string secrets.databasePassword="${{ secrets.DATABASE_PASSWORD }}" \
            --set-string secrets.databaseHost="${{ secrets.DATABASE_HOST }}" \
            --set-string secrets.databasePort="${{ secrets.DATABASE_PORT }}" \
            --set-string secrets.databaseName="${{ secrets.DATABASE_NAME }}" \
            --set-string secrets.databaseSsl="${{ secrets.DATABASE_SSL }}" \
            -f helm/values.yaml
